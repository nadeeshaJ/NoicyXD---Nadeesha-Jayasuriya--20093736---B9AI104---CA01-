# Sound Analytics Platform — Docker Compose
#
# Quick start (from repo root):
#   cp docker/.env.example .env
#   # Edit .env with Supabase keys and PUBLIC_URL
#   # Ensure model checkpoints exist under experiments/ (see docker/start.sh)
#   docker compose up -d --build
#
# Open: http://localhost  (or your PUBLIC_URL)
# Health: curl http://localhost/api/health

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      ML_PROJECT_ROOT: ${ML_PROJECT_ROOT:-../../}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    volumes:
      # Mount checkpoints at runtime (not in git). Required for inference.
      - ./experiments:/app/experiments:ro
      # Optional: raw/processed audio for dataset sample playback.
      - ./data:/app/data:ro
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  web:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-${SUPABASE_URL}}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-${SUPABASE_ANON_KEY}}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
